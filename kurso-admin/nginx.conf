server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths return index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

name: Docker

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "kurso-api/**"
      - ".github/workflows/docker.yml"

jobs:
  build:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Stage 0: build only (no registry push) — deploys are manual for now.
      - name: Build kurso-api image
        uses: docker/build-push-action@v6
        with:
          context: ./kurso-api
          push: false
          load: true
          tags: kurso-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
